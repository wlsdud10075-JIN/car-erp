name: deploy

# master 머지/푸시 시 운영 서버에 SSH 배포 (큐 13 — AWS Lightsail).
# dev → master 머지가 트리거. (CLAUDE.md: master = 프로덕션 브랜치)
on:
  push:
    branches:
      - master

# 동시 배포 충돌 방지 (이전 배포 끝날 때까지 대기)
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          # ⚠️ .env 는 gitignore → git reset 가 건드리지 않음 → APP_KEY(RRN 암호화 키) 보존.
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            # 서류 PDF 변환용 LibreOffice + 한글폰트 (멱등 — 이미 설치면 즉시 통과). 실패해도 배포 계속(PDF만 불가, xlsx 정상).
            command -v soffice >/dev/null 2>&1 || { sudo apt-get update -qq && sudo DEBIAN_FRONTEND=noninteractive apt-get install -y libreoffice-calc fonts-nanum; } || echo "::warning::libreoffice 설치 실패 — 서류 PDF 변환 불가(xlsx 다운로드는 정상)"
            # Review.md #7 (2026-06-09) — 코드·의존성·빌드는 점검모드 진입 전에 수행.
            # 빌드(composer/npm) 실패는 set -e 로 여기서 종료 → 사이트는 안 내려감(갇힘 방지).
            git fetch origin master
            git reset --hard origin/master
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            npm ci
            npm run build
            # Review2 D (2026-06-09) — 배포 직전 DB 스냅샷(파괴적 마이그 대비 복구점). best-effort.
            php artisan db:backup || echo "::warning::pre-deploy db:backup failed — proceeding without fresh snapshot"
            # 점검모드 진입 — errors/503 를 미리 렌더(정적 서빙)해서 배포 중 앱이 못 뜨는 순간에도
            #   깨끗한 "점검 중 1~5분" 페이지 노출. 구 코드(뷰 부재)면 plain down 폴백. Retry-After 120s.
            php artisan down --retry=120 --render="errors.503" || php artisan down || true
            # Review2 D — migrate 실패 시 점검모드 '유지'(up 안 함) + 에러 + 비정상 종료.
            # 정합성 깨진 서비스보다 점검 중 서비스가 낫다(ERP=데이터 정합성). half-migrated 서빙 방지.
            if ! php artisan migrate --force; then
              echo "::error::migration failed — site kept in MAINTENANCE. 복구: storage/backups/db 최신 스냅샷 복원 후 재배포"
              exit 1
            fi
            # migrate 성공 이후 — 캐시/링크 실패는 up 을 막지 않음(복구 가능 → 항상 서비스 복귀).
            php artisan config:cache || true
            php artisan route:cache || true
            php artisan view:cache || true
            php artisan storage:link || true
            # PHP-FPM 재시작(opcache 갱신) — 서버 서비스명에 맞게 조정. 무중단이면 reload.
            sudo systemctl reload php8.4-fpm || true
            php artisan queue:restart || true
            php artisan up

  # 2번째 회사 karaba 서버 (멀티회사, 2026-06-14). heyman 잡과 동일 스크립트 —
  # environment=karaba 로 DEPLOY_* 시크릿만 분리. 한 잡 실패해도 다른 잡은 영향 없음.
  deploy-karaba:
    runs-on: ubuntu-latest
    environment: karaba
    steps:
      - name: Deploy over SSH (karaba)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            # 서류 PDF 변환용 LibreOffice + 한글폰트 (멱등). 실패해도 배포 계속(PDF만 불가, xlsx 정상).
            command -v soffice >/dev/null 2>&1 || { sudo apt-get update -qq && sudo DEBIAN_FRONTEND=noninteractive apt-get install -y libreoffice-calc fonts-nanum; } || echo "::warning::libreoffice 설치 실패 — 서류 PDF 변환 불가(xlsx 정상)"
            git fetch origin master
            git reset --hard origin/master
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            npm ci
            npm run build
            php artisan db:backup || echo "::warning::pre-deploy db:backup failed — proceeding without fresh snapshot"
            # 점검모드 진입 — errors/503 pre-render(정적 서빙). 구 코드(뷰 부재)면 plain down 폴백.
            php artisan down --retry=120 --render="errors.503" || php artisan down || true
            if ! php artisan migrate --force; then
              echo "::error::migration failed — site kept in MAINTENANCE. 복구: storage/backups/db 최신 스냅샷 복원 후 재배포"
              exit 1
            fi
            php artisan config:cache || true
            php artisan route:cache || true
            php artisan view:cache || true
            php artisan storage:link || true
            sudo systemctl reload php8.4-fpm || true
            php artisan queue:restart || true
            php artisan up

  # 3번째 회사 ssancar 서버 (2026-06-30 추가). ⚠️ NICE 게이트웨이(heymancar.com/provide/)와
  # co-location → artisan down 시 heyman NICE 조회까지 멈춤. 그래서 이 잡만 '무중단'(down 없음).
  # 추가형 마이그(create table 등)는 안전. 파괴적/대형 마이그는 ssancar 수동배포(런북) 권장.
  deploy-ssancar:
    runs-on: ubuntu-latest
    environment: ssancar
    steps:
      - name: Deploy over SSH (ssancar — no-downtime, NICE 보호)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            # 서류 PDF 변환용 LibreOffice + 한글폰트 (멱등). 실패해도 배포 계속(PDF만 불가, xlsx 정상).
            command -v soffice >/dev/null 2>&1 || { sudo apt-get update -qq && sudo DEBIAN_FRONTEND=noninteractive apt-get install -y libreoffice-calc fonts-nanum; } || echo "::warning::libreoffice 설치 실패 — 서류 PDF 변환 불가(xlsx 정상)"
            php artisan db:backup || echo "::warning::pre-deploy db:backup failed — proceeding"
            git fetch origin master
            git reset --hard origin/master
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            npm ci
            npm run build
            # ⚠️ artisan down 없음 — NICE /provide/ 무중단 유지. 추가형 마이그 전제.
            php artisan migrate --force
            php artisan config:cache || true
            php artisan route:cache || true
            php artisan view:cache || true
            php artisan storage:link || true
            sudo systemctl reload php8.4-fpm || true
            php artisan queue:restart || true
