name: deploy

# master 머지/푸시 시 운영 서버에 SSH 배포 (큐 13 — AWS Lightsail).
# dev → master 머지가 트리거. (CLAUDE.md: master = 프로덕션 브랜치)
on:
  push:
    branches:
      - master

# 동시 배포 충돌 방지 (이전 배포 끝날 때까지 대기)
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          # ⚠️ .env 는 gitignore → git reset 가 건드리지 않음 → APP_KEY(RRN 암호화 키) 보존.
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            php artisan down || true
            git fetch origin master
            git reset --hard origin/master
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            npm ci
            npm run build
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan storage:link || true
            # PHP-FPM 재시작(opcache 갱신) — 서버 서비스명에 맞게 조정. 무중단이면 reload.
            sudo systemctl reload php8.4-fpm || true
            php artisan queue:restart || true
            php artisan up
