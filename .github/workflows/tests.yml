name: tests

on:
  push:
    branches:
      - dev
      - master
  pull_request:
    branches:
      - dev
      - master

jobs:
  ci:
    runs-on: ubuntu-latest
    environment: Testing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm i

      - name: Create SQLite Database
        run: touch database/database.sqlite

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Build Assets
        run: npm run build

      - name: Run Tests
        run: ./vendor/bin/phpunit

  # Review2 항목 C (2026-06-09) — 운영 MySQL 8 동형 검증 (전체 스위트는 SQLite 전용 코드라 별도 경량 잡).
  # ① 마이그레이션이 MySQL 8 에 깨끗이 적용되는지(배포기록 §5 의 CHECK/Pending 사고 포착)
  # ② chk_sale_required CHECK 가 살아있는지(= #5 환율0 정산음수 방어가 SQLite에선 검증 안 되는 false confidence 해소)
  mysql-check:
    runs-on: ubuntu-latest
    environment: Testing
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: car_erp_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: car_erp_test
      DB_USERNAME: root
      DB_PASSWORD: root
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer:v2
          extensions: pdo_mysql, mbstring, bcmath

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Migrate on MySQL 8 (운영 동형 — 마이그·CHECK 적용 검증)
        run: php artisan migrate --force

      - name: Run MySQL-only CHECK constraint tests
        run: ./vendor/bin/phpunit --filter MysqlCheckConstraint